<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Parte 1 | Lista 02 - Introdução ao JavaScrip | exc 02
    </title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="titulo-atividade">
        <h1>Exercicio 02, calculadora de peso e altura.</h1>
    </div>

    <div class="form-atividade">
        <div class="form-itens">
            <div class="form-group-itens">
                <label for="pesoPessoa">Seu peso em kilogramas:</label>
                <input type="text" id="pesoPessoa" placeholder="Digite seu peso">
            </div>

            <div class="form-group-itens">
                <label for="alturaPessoa">Sua altura em metros:</label>
                <input type="text" id="alturaPessoa" placeholder="Digite sua altura">
            </div>

            <div class="form-group-button">
                <h6 id="resultadoCalculo"></h6>
                <button onclick="exercicio02()">Fale Comigo!</button>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    function exercicio02() {
        let weightPessoa = pesoPessoa.value;
        let heightPessoa = alturaPessoa.value;

        resultadoCalculo.innerHTML = "Você pesa " + weightPessoa + " kg e tem " + heightPessoa + " m de altura. ";
    }
</script>
