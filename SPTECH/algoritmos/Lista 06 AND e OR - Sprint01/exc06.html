<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 | 6. Desempenho Escolar: O Aluno Foi Aprovado?</title>
</head>
<body>
    <div class="box-form">
        <div class="form-row-title">
            <h1>Desempenho Escolar!</h1>
        </div>
        <div class="form-group-row">
            <div class="form-row">
                <label for="nota_aluno">Digite a nota do aluno:</label>
                <input type="number" id="inpt_nota_aluno">
            </div>
            <div class="form-row">
                <label for="freq_aluno">Digite a frequência do aluno:</label>
                <input type="number" id="inpt_freq_aluno">
            </div>
        </div>
        <div class="form-row-button">
            <button onclick="nota()">Analisar aluno</button>
        </div>
        <div class="form-resultado">
            <h3 id="resultado" style="text-align: center;"></h3>
        </div>
    </div>
</body>
</html>

<script>
    function nota(){
        let nota_aluno = Number(inpt_nota_aluno.value);
        let freq_aluno = Number(inpt_freq_aluno.value);
        resultado.innerHTML = ``;

        if((nota_aluno < 6)){
            resultado.innerHTML = `Aluno ficou abaixo da média!`;
        }else if((nota_aluno > 6 && nota_aluno <= 8)){
            resultado.innerHTML = `Aluno ficou na média!`;
        }else{
            resultado.innerHTML = `Aluno acima da média!`;
        }

        if(freq_aluno < 75){
            resultado.innerHTML += `<br>Aluno reprovado por frequência!`;
        }else{
            resultado.innerHTML += `<br>Aluno aprovado por frequência!`;
        }

        if(freq_aluno < 0 || freq_aluno > 100){
            alert(`Onde já se viu frequência <0 ou >100?!`);
            resultado.innerHTML = ``;
        }

        if(nota_aluno < 0 || nota_aluno > 10){
            alert(`Onde já se viu nota <0 ou >10?!`);
            resultado.innerHTML = ``;
        }
    }
</script>
