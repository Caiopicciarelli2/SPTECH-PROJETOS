<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 | 5. Avaliação do Clima: Está Agradável ou Desconfortável?</title>
</head>
<body>
    <div class="box-form">
        <div class="form-row-title">
            <h1>Avaliação do Clima!</h1>
        </div>
        <div class="form-group-row">
            <div class="form-row">
                <label for="valor_temp">Digite a temperatura:</label>
                <input type="number" id="valor_temp">
            </div>
            <div class="form-row">
                <label for="valor_umidade">Digite a umidade do ar:</label>
                <input type="number" id="valor_umidade">
            </div>
        </div>
        <div class="form-row-button">
            <button onclick="clima()">Avaliar clima</button>
        </div>
        <div class="form-resultado">
            <h3 id="resultado"></h3>
        </div>
    </div>
</body>
</html>

<script>
    function clima(){
        let temp = Number(valor_temp.value);
        let umidade = Number(valor_umidade.value);
        resultado.innerHTML = ``;

        if(umidade < 0 || umidade > 100){
            alert(`Valor de umidade inválido`);
            resultado.innerHTML = ``;
        }else if(temp >= 22){
            if((temp <= 23) && (umidade < 60)){
                resultado.innerHTML = `Clima agradável!`;
            }else{
                resultado.innerHTML = `Clima desconfortável!`;
            }
        }else{
            resultado.innerHTML = `Clima desconfortável!`;
        }
    }
</script>
