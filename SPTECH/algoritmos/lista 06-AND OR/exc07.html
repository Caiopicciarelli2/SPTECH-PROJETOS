<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 | 4. Autenticação Segura: Acesso ao Banco Melete</title>
</head>
<body>
    <div class="box-form">
        <div class="form-row-title">
            <h1>Acesso ao Banco Melete!</h1>
        </div>
        <div class="form-group-row">
            <div class="form-row">
                <label for="inpt_login">Seu login:</label>
                <input type="text" id="inpt_login">
            </div>
            <div class="form-row">
                <label for="inpt_senha">Sua senha:</label>
                <input type="text" id="inpt_senha">
            </div>
            <div class="form-row">
                <label for="inpt_info_pessoal">Sua código pessoal:</label>
                <input type="text" id="inpt_info_pessoal">
            </div>
        </div>
        <div class="form-row-button">
            <button onclick="login_banco()">Autenticar</button>
        </div>
        <div class="form-resultado">
            <h3 id="resultado" style="text-align: center;"></h3>
        </div>
    </div>
</body>
</html>

<script>
    let tentativas = 3;
    let userbloqueado = false;

    function login_banco(){
        let login = inpt_login.value;
        let senha = inpt_senha.value;
        let info = inpt_info_pessoal.value;
        resultado.innerHTML = ``;

        if((login == ``) || (senha == ``) || (info == ``)){
            resultado.innerHTML = `Preencha corretamente todos os campos!`
        }else if((login == `ana`) && (senha == `braga`) && (info == `1949` || info == `louro josé`)){
            resultado.innerHTML = `Usuário autenticado!` 
        }else if(tentativas >= 1){
            resultado.innerHTML = `Falha na autenticação!`;
            tentativas --;
            resultado.innerHTML += `<br>Você ainda tem ${tentativas} tentativa(s)!`;
        }

        if(tentativas == 0){
            userbloqueado = true;
            resultado.innerHTML = `Usuário BLOQUEADO! Procure seu gerente!`;
        }

    }
</script>
