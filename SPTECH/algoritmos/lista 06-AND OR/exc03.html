<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 | 3. Simulador de Preço do Bilhete Único de São Paulo</title>
</head>
<body>
    <div class="box-form">
        <div class="form-row-title">
            <h1>Simulador de Preço do Bilhete Único!</h1>
        </div>
        <div class="form-group-row">
            <div class="form-row-options">
                <label for="select_passageiro">Selecione o tipo de passageiro:</label>
                <select name="select_passageiro" id="select_passageiro">
                    <option value="default" selected>Selecione:</option>
                    <option value="Comum">Comum</option>
                    <option value="Estudante">Estudante</option>
                    <option value="Idoso">Idoso/PNE</option>
                </select>
            </div>
        
            <div class="form-row-options">
                <label for="select_passagem">Selecione a cor:</label>
                <select name="select_passagem" id="select_passagem">
                    <option value="default" selected>Selecione:</option>
                    <option value="Passagem_unica">Passagem única</option>
                    <option value="Passagem_integracao">Passagem integração</option>
                </select>
            </div>
        </div>
        <div class="form-row-button">
            <button onclick="passagemCalc()">Simular preço</button>
        </div>
        <div class="form-resultado">
            <div id="resultado">

            </div>
        </div>
    </div>
</body>
</html>

<script>
    function passagemCalc(){
        let passagem = select_passagem.value;
        let passageiro = select_passageiro.value;
        let valor = 0;
        resultado.innerHTML = ``;

        if((passagem == `default` || passageiro == `default`)){
            resultado.innerHTML = `Escolha opções válidas para os dois campos!`;
        }else if(passageiro == `Comum`){
            if(passagem == `Passagem_unica`){
                valor = 4.40;
                resultado.innerHTML = `Valor da passagem escolhida: R$${valor.toFixed(2)}.`;
            }else{
                valor = 5.90;
                resultado.innerHTML = `Valor da passagem escolhida: R$${valor.toFixed(2)}.`;
            }
        }else if(passageiro == `Estudante`){
            if(passagem == `Passagem_unica`){
                valor = 2.20;
                resultado.innerHTML = `Valor da passagem escolhida: R$${valor.toFixed(2)}.`;
            }else{
                valor = 2.95;
                resultado.innerHTML = `Valor da passagem escolhida: R$${valor.toFixed(2)}.`;
            }
        }else{
            resultado.innerHTML = `Valor da passagem escolhida: R$00.00, você possui gratuidade!`;
        }

        

    }
</script>

<style>

        display: flex;
        align-items: center;
        justify-content: center;
        height: 90vh;
        width: 99%;
    }

        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        height: 60vh;
        width: 80%;
        border: 1px solid rgba(0, 0, 0, 0.253);
        border-radius: 0.3rem;
        padding: 1.2rem;
    }

    .form-row-title{
        display: flex;
        align-items: flex-start;
        justify-content: center;
        height: 30%;
        width: 100%;
    }

    .form-row-title h1{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1.6rem;
    }

    .form-group-row{
        display: flex;
        align-items: center;
        justify-content: center;
        height: 40%;
        width: 100%;
        gap: 0.3rem;
    }

    .form-row, .form-row-options{
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        width: 40%;
        gap: 0.3rem;
    }

    .form-row label, .form-row-options label{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .form-row-options select{
        padding: 0.3rem;
        border: 1px solid rgba(0, 0, 0, 0.248);
        border-radius: 0.3rem;
    }

    .form-row input{
        padding: 0.3rem;
        border: 1px solid rgba(0, 0, 0, 0.248);
        border-radius: 0.3rem;
    }

    .form-row-button{
        display: flex;
        align-items: center;
        justify-content: center;
        height: 20%;
        width: 100%;
    }

    .form-row-button button{
        padding: 0.5rem;
        border-radius: 0.3rem;
        border: 1px solid rgba(0, 0, 0, 0.250);
        background-color: transparent;
        cursor: pointer;
        transition: 0.3s;
    }

    .form-row-button button:hover{
        background-color: black;

    }

    .form-resultado{
        display: flex;

    }

    .form-resultado h3, .form-resultado{

        font: 1rem; 
    }
</style>
