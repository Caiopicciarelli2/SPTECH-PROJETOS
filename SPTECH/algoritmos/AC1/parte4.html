<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Calculadora SPFlix</h1>

    <div>
        <p>Qualidade (720p ou 1080p ou 4K):</p>
        <input type="text" id="ipt_qualidade">
    </div>

    <div style="display: flex; gap: 50px">
        <div>
            <p>Telas simultâneas - Na mesma casa:</p>
            <input type="text" id="ipt_qtd_telas">
        </div>

        <div>
            <p>Telas extras - Fora da residência:</p>
            <input type="text" id="ipt_qtd_telas_extras">
        </div>
    </div>

    <div>
        <p>Quer fazer download ('sim' ou 'nao'):</p>
        <input type="text" id="ipt_download">
    </div>

    <p></p>
    <button onclick="exibirResultado()">Exibir Resultado</button>

    <p></p>
    <div id="div_mensagem"></div>

</body>

</html>

<script>
    function exibirResultado() {
        // reiniciar innerHTML

        div_mensagem.innerHTML = ``;

        // variaveis parte 01
        let qualidade = (ipt_qualidade.value);

        let custoPlano = 0;

        // variaveis parte 02

        let telas_simu_casa = Number(ipt_qtd_telas.value);
        let telas_simu_extra = Number(ipt_qtd_telas_extras.value);

        let precoPlano = 0;

        // variaveis parte 03

        let valorFinal = 0;
        let totaltelas = 0;
        let valorfinalDividido = 0;

        // variavies parte 04

        let download = (ipt_download.value);

        // parte 01 - qualidade

        if (qualidade == ``) {
            div_mensagem.innerHTML = `Digite uma qualidade válida para definir o preço do seu plano.<br>`;

        } else if (qualidade == `720p`) {
            custoPlano = 15.00;

        } else if (qualidade == `1080p`) {
            custoPlano = 20.00;

        } else if (qualidade == `4K`) {
            custoPlano = 25.00;

        } else {
            div_mensagem.innerHTML += `Digite uma qualidade válida para definir o preço do seu plano.<br>`;
        }

        if (telas_simu_casa <= 0) {
            div_mensagem.innerHTML += `Digite um valor válido de telas para definir seu plano.<br>`;
        }

        // parte 02 - telas

        if (telas_simu_casa <= 0) {

        } else if (telas_simu_casa <= 2) {
            precoPlano = 10.00;

            if (telas_simu_extra > 0) {
                precoPlano = precoPlano + (telas_simu_extra * 12.90);
            }

        } else if (telas_simu_casa <= 4) {
            precoPlano = 20.00;

            if (telas_simu_extra > 0) {
                precoPlano = precoPlano + (telas_simu_extra * 12.90);
            }

        } else if (telas_simu_casa > 4) {
            precoPlano = 30.00;

            if (telas_simu_extra > 0) {
                precoPlano = precoPlano + (telas_simu_extra * 12.90);
            }

        }

        // parte 03 - total

        // total telas
        totaltelas = (telas_simu_casa + telas_simu_extra);


        // valor final calculo
        valorFinal += precoPlano;
        valorFinal += custoPlano;
        valorfinalDividido = (valorFinal / totaltelas);

        // parte 04 - acrescimo

        let acrescimo = (valorFinal + (valorFinal * 0.05) + (valorFinal * (totaltelas * 0.01)));
        let desconto = (valorFinal - (valorFinal * 0.10));

        let porcentAcrescimo = (acrescimo - valorFinal) / valorFinal;

        // mensagens finais

        if (totaltelas > 0) {
            div_mensagem.innerHTML += 
            `
              O valor base do seu plano é R$${custoPlano}.<br>
              O valor das telas do seu plano é R$${precoPlano}.<br>
            `;

            if(download == `Sim`){

              valorfinalDividido = (acrescimo / totaltelas);

              div_mensagem.innerHTML += 
              `
                Você optou por fazer download e por isso sua conta irá subir em ${porcentAcrescimo.toFixed(2)}%.<br>
                Valor final: R$${acrescimo.toFixed(2)}.<br>
                Se quiser dividir fica R$${valorfinalDividido.toFixed(2)} para cada! <br>
              `;

            }else if(download == `Não`){

              valorfinalDividido = (desconto / totaltelas);

              div_mensagem.innerHTML += 
              `
                Você optou por não fazer download e por isso sua conta será reduzida em 10%.<br>
                Valor final: R$${desconto.toFixed(2)}.<br>
                Se quiser dividir fica R$${valorfinalDividido.toFixed(2)} para cada! <br>
              `;

            }else{
              div_mensagem.innerHTML = `Digite um valor válido no input "Download!"`;
            }
        }

    }

    // erro do código: a verificação de preenchimento dos inputs necessários não funciona nos dois elementos quando você coloca um valor em um, e deixa o outro vazio. Ou seja, ele mostra a mensagem aviso de que falta escolher o valor, mas já mostra o valor final, divido etc.. Neste caso, há agora dois campos que ocorrem esse mesmo bug no qual eu não consegui resolve-lo sem optar por if com mais de uma condicional, como não podemos usa-la ainda, não cheguei em um resultado concreto de como resolver esse bug, porém o código funciona nos padrões do exercíco.

</script>
