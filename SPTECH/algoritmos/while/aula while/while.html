<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHILE</title>
</head>

<body style="display: flex; gap: 2vw;">
    <div id="resultado">

    </div>

    <div id="resultado2">

    </div>
</body>

</html>


<script>
    resultado.innerHTML +=
        `
        Com while: <br><br>
    `;

    let contador = 0;

    // enquanto = While
    while (contador <= 9) {
        resultado.innerHTML +=
            `
            O Contador é: ${contador + 1};<br><br>
        `;
        contador++;
    }

    resultado2.innerHTML +=
        `
        Agora com FOR: <br><br>
    `;

    for (let i = 0; i <= 9; i++) {
        resultado2.innerHTML +=
            `
            O Contador é: ${i + 1};<br><br>
        `;
    }

    // nesse primeiro cenário é melhor usar o FOR, para não cair com tanta
    // falicidade em um FOR infinito
</script>
