<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 | 4. S2 Pares</title>
</head>

<body>
    <button onclick="pares()">S2 Pares</button>

    <div id="resultado">

    </div>
</body>

</html>

<script>
    function pares() {
        let contador = 0;

        while (contador < 100) {
            if (contador % 2 == 0) {
                resultado.innerHTML +=
                `
                    ${contador}. <br>
                `;
            }
            contador ++;
        }
    }
</script>
