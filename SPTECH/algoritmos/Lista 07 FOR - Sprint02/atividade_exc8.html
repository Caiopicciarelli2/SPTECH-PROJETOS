<script>
    function deposito() {
        let qtd_Dep = Number(qtd_deposito.value);
        let valor_Dep = Number(valor_deposito.value);
        let contador = 0;
        let valor_guardado = 0;

        if ((qtd_Dep == 0 || valor_Dep == 0) || (qtd_Dep < 0 || valor_Dep < 0)) {
            resultado.innerHTML =
                `
                Complete os campos de forma correta.
            `;
        } else {
            for (let i = 1; i <= qtd_Dep; i++) {
                contador++;
                
                if(){
                    (valor_Dep * i)
                    
                    if (contador == 3) {
                    contador = 0;
                    valor_guardado = valor_guardado + (valor_Dep * 0.01);
                }
                }

                resultado.innerHTML +=
                    `
                    ${i}º Mês: R$ ${valor_guardado}.   
                `;
            }
        }
    }
</script>
