<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 3 (IF/ELSE) | 12. Crie um programa o qual: </title>
</head>

<body>
    <label for="id_peso_total">Peso total no elevador:</label>
    <input type="number" id="id_peso_total" placeholder="Digite o valor">

    <button onclick="calcPesoTotal()">
        Ligar elevador
    </button>

</body>

</html>

<script>
    function calcPesoTotal() {
        let pesoTotal = Number(id_peso_total.value);

        if(pesoTotal < 500){
            alert(`Elevador vai se mover`);
        }else{
            alert(`Alguém precisa descer do elevador`);
        }
    }
</script>
