<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Impel Down by Caio Picciarelli</title>
</head>

<body>
    <label>Qquantidade de batalhas do Luffy: </label>
    <input type="number" id="ipt_batalhas"><br>

    <label>Quantidade de marinheiros: </label>
    <input type="number" id="ipt_marinheiros"><br>

    <label>Quantidade de carnes: </label>
    <input type="Number" id="ipt_carnes"><br>

    <button onclick="luffy_simples()">Luffy</button><br><br>

    <div id="resultado"></div>
</body>
<script>
    function luffy_simples() {
        let energiaLuffy = 100;
        let batalhas = Number(ipt_batalhas.value);
        let marinheiros = Number(ipt_marinheiros.value);
        let carnes = Number(ipt_carnes.value);

        resultado.innerHTML = "";
        let mensagem_final = "";

        for (let i = 0; i < batalhas; i++) {
            if (energiaLuffy > 0 || carnes > 0) {
                // Começando uma batalha
                let marinheirosRestantes = marinheiros;

                mensagem_final += `
                    ${i + 1}° Batalha Iniciada: <br>
                    Quantidade de Energia: ${energiaLuffy} <br>
                `;

                let energiaNecessaria = marinheiros * 5;

                if (energiaNecessaria <= energiaLuffy) {
                    energiaLuffy -= energiaNecessaria;
                    marinheirosRestantes = 0;
                }
                else {
                    // Começando a derrotar alguns marinheiros
                    let derrotando = energiaLuffy / 5;
                    marinheirosRestantes -= derrotando;
                    energiaLuffy = 0;

                    // Comer a carne
                    if (carnes > 0) {
                        energiaNecessaria = marinheirosRestantes * 5;
                        energiaLuffy = 100;
                        carnes -= 1;

                        // Terminar de derrotar
                        energiaLuffy -= energiaNecessaria;
                        marinheirosRestantes = 0;
                    }
                }

                if (marinheirosRestantes <= 0) {
                    mensagem_final += `Resultado: Luffy saiu vitorioso, derrotando ${marinheiros} marinheiro(s)<br>`;
                } else {
                    mensagem_final += `Resultado: Luffy foi derrotado, derrotando ${marinheiros - marinheirosRestantes} marinheiro(s)<br>`;
                }

                mensagem_final += `
                    ⚡ Energia Restante no Final da Batalha: ${energiaLuffy}<br>
                    🥩 Carnes Restantes no Final da Batalha: ${carnes}<br>
                `

                energiaLuffy -= 10
            }
            else {
                mensagem_final += `🛞 Não é possível iniciar a ${i + 1}º batalha, acabou a carne e a energia.<br>`;
            }

            mensagem_final += "<br>";
        }

        resultado.innerHTML = mensagem_final;
    }
</script>

</html>
