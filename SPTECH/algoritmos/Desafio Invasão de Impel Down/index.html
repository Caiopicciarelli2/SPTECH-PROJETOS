    function luffySimples() {
        let carnes = Number(qtd_carnes.value);
        let marinheiros = Number(qtd_marinheiros.value);
        let batalhas = Number(qtd_batalhas.value);

        let energia = 100;

        resultado.innerHTML = ``;

        if (batalhas <= 0 || marinheiros <= 0) {
            resultado.innerHTML = `Preencha os campos corretamente!`;
        }

        for (let i = 1; i <= batalhas; i++) {

            // Verifica se pode lutar
            if (energia <= 0 && carnes <= 0) {
                resultado.innerHTML +=
                `
                    <br>🛞 Não é possível iniciar a ${i}º batalha, acabou a carne e a energia.<br>
                `;
            }

            resultado.innerHTML += 
            `
                <br>----------------------------------------<br>

                ${i}° Batalha Iniciada:<br>
                Quantidade de Energia Inicial: ${energia}<br><br>
            `;

            let energia_necessaria = marinheiros * 5;

            // Se energia não for suficiente, tenta usar carne
            if (energia < energia_necessaria && carnes > 0) {
                carnes--;
                energia += 100;
            }

            if (energia >= energia_necessaria) {
                energia -= energia_necessaria;

                resultado.innerHTML += 
                `
                    Resultado: Luffy saiu vitorioso, derrotando ${marinheiros} marinheiro(s)<br>
                    ⚡ Energia Restante no Final da Batalha: ${energia}<br>
                    🥩 Carnes Restantes no Final da Batalha: ${carnes}<br>
                `;
            } else {
                let marinheiros_derrotados = energia / 5;

                resultado.innerHTML += 
                `
                    Resultado: Luffy foi derrotado, derrotando ${marinheiros_derrotados} marinheiro(s)<br>
                    ⚡ Energia Restante no Final da Batalha: 0<br>
                    🥩 Carnes Restantes no Final da Batalha: ${carnes}<br>
                `;

                energia = 0;
            }
        }
    }
