<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 01 - (IF) | 3. Média Escolar de Paty</title>
</head>
<body>
    <label for="id_nota_1">Valor das 3 últimas notas:</label>
    <input type="number" id="id_nota_1" placeholder="Digite a nota 1">
    <input type="number" id="id_nota_2" placeholder="Digite a nota 2">
    <input type="number" id="id_nota_3" placeholder="Digite a nota 3">

    <button onclick="calcMedia()">Analisar desempenho</button>

    <h1 id="mensagem"></h1>
    <h2 id="mensagem2"></h2>
    
</body>
</html>

<script>
    function calcMedia(){
        let nota1 = Number(id_nota_1.value);
        let nota2 = Number(id_nota_2.value);
        let nota3 = Number(id_nota_3.value);

        let media = (nota1 + nota2 + nota3) / 3;

        mensagem.innerHTML = `Sua média foi de ${media.toFixed(2)}`;

        if(media > 9.4){
            mensagem2.innerHTML = `Parabéns, você é fora de série!`;
        }
    }
</script>
