<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 01 - (IF) | 4a. Divisão Justa da Pizza (Com Estilo) </title>
</head>
<body>
    <label for="id_valor_pizza">Valor da pizza:</label>
    <input type="number" id="id_valor_pizza" placeholder="Digite o valor">
    
    <label for="">Quantidade de amigos:</label>
    <input type="number" id="id_qtd_amigos" placeholder="Digite qtd. amigos">

    <button onclick="calcPizza()">
        Rola Pizza?
    </button>

    <h1 id="mensagem"></h1>
    <h2 id="mensagem2" style="font-style: italic;"></h2>
    
</body>
</html>

<script>
    function calcPizza(){
        let valorPizza = Number(id_valor_pizza.value);
        let qtdAmigos = Number(id_qtd_amigos.value);

        let divisao = Number(valorPizza / qtdAmigos )

        mensagem.innerHTML = `Cada amigo vai pagar R$${divisao} pela pizza`;

        if(divisao > 20.00){
            mensagem2.innerHTML = `
            <i>
                <b style="color: red;">
                    Deu ruim! Pizza muito cara!
                </b>
            </i>`;
        }
    }
</script>
