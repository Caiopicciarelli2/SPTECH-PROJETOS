<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 01 - (IF) | 5. Cálculo da Conta de Luz </title>
</head>

<body>
    <label for="id_qtd_kwh">Quantidade de KWh consumida no mẽs</label>
    <input type="number" id="id_qtd_kwh" placeholder="Digite a quantidade em KWh">

    <button onclick="calcContaLuz()">
        Calcular conta de luz
    </button>

    <h1 id="mensagem"></h1>
    <h2 id="mensagem2"></h2>

</body>

</html>

<script>
    function calcContaLuz() {
        let qtdKWh = Number(id_qtd_kwh.value);

        let conta = qtdKWh * 0.85;

        if (qtdKWh < 100) {
            conta = Number(conta * 0.9);
        }
        alert(`O valor da sua conta de luz ficou R$${conta.toFixed(2)}.`)
    }
</script>
