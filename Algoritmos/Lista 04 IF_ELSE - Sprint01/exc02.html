<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 01 - (IF) | 2. Consumo Anual de Refrigerante</title>
</head>
<body>
    <label for="id_qtd_latinhas">Quantas latinhas de rerigerante você toma por dia:</label>
    <input type="number" id="id_qtd_latinhas" placeholder="Digite a quantidade">

    <button onclick="calcRefris()">Quantos Refris</button>

    <h1 id="mensagem"></h1>
    <h2 id="mensagem2"></h2>
    
</body>
</html>

<script>
    function calcRefris(){
        let refris = Number(id_qtd_latinhas.value);

        let refrisAno = ( refris * 365);

        mensagem.innerHTML = `Você bebe ${refrisAno} latinhas por ano`;

        if(refrisAno > 500){
            mensagem2.innerHTML = `Cuidado com a diabetes!`;
        }
    }
</script>
