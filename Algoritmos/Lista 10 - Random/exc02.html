<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. Crie um programa o qual: </title>
</head>

<body>
    <button onclick="sortear()">Sortear Time</button>
    <br>
    <br>
    <hr>
    <div id="resultado">

    </div>

</body>

</html>

<script>
    function sortear() {
        resultado.innerHTML = ``;
        let min = 1;
        let max = 4;
        let aleatorio2 = Math.random();

        let sorteio = parseInt(aleatorio2 * (max - min + 1) + min);
        console.log(sorteio)

        if (sorteio == 1) {
            resultado.innerHTML =
                `
                <img src="./images/corinthians.jpeg" style="height: 150px;" alt="Escudo do Corinthians">
            `;
        } else if (sorteio == 2) {
            resultado.innerHTML =
                `   
                <img src="./images/palmeiras.jpeg" style="height: 150px;" alt="Escudo do Palmeiras">
            `;
        } else if (sorteio == 3) {
            resultado.innerHTML =
                `
                <img src="./images/santos.jpeg" style="height: 150px;" alt="Escudo do Santos">
            `;
        } else {
            resultado.innerHTML =
                `
                <img src="./images/saopaulo.png" style="height: 150px;" alt="Escudo do São Paulo">
            `;
        }

    }   
</script>
