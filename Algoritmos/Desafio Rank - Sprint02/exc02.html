<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div class="container">
        <div class="content-title">
            <h1>Lista 07 | Exercício 02 - Desafio: Adivinhe o Ranking da Competição.</h1>
        </div>
        <div class="main-content">
            <div class="content-left">
                <div class="content-row">
                    <label for="ipt_1_lugar">1º lugar:</label>
                    <input type="text" name="" id="ipt_1_lugar">
                    <label for="ipt_2_lugar">2º lugar:</label>
                    <input type="text" name="" id="ipt_2_lugar">
                </div>
                <div class="content-row">
                    <label for="ipt_3_lugar">3º lugar:</label>
                    <input type="text" name="" id="ipt_3_lugar">
                    <label for="ipt_4_lugar">4º lugar:</label>
                    <input type="text" name="" id="ipt_4_lugar">
                </div>
                <div class="content-row">
                    <label for="ipt_5_lugar">5º lugar:</label>
                    <input type="text" name="" id="ipt_5_lugar">
                </div>
                <div class="content-row-button">
                    <button onclick="classificacao1()">
                        Analisar
                    </button>
                </div>
                <div class="content-row-resultado">
                    <h1 id="resultado">

                    </h1>
                </div>
            </div>
            <div class="content-right">
                <div class="content-row-2">
                    <label for="ipt_meus_campeoes">Digite o nome do campẽao:</label>
                    <input type="text" name="" id="ipt_meus_campeoes">
                </div>
                <div class="content-row-button2">
                    <button onclick="adicionar()">Adicionar</button>
                </div>
                <div class="content-row-resultado2">
                    <h1 id="resultado2">
                        <span style="font-size: 1.4rem; font-weight: 600; color: rgb(107, 107, 28);">Meus
                            Campeões:</span>
                    </h1>
                </div>
                <div class="content-row-busca">
                    <div class="busca-ipt">
                        <input type="text" name="" id="ipt_buscar">
                        <button type="" onclick="buscar()">Buscar</button>
                    </div>
                    <div class="resultado3">
                        <h2 id="resultado3"></h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    let classificacao = [
        "Caio", "Bruno", "Guilherme", "Gustavo", "Luiz"
    ];

    function classificacao1() {
        let primeiro = ipt_1_lugar.value;
        let segundo = ipt_2_lugar.value;
        let terceiro = ipt_3_lugar.value;
        let quarto = ipt_4_lugar.value;
        let quinto = ipt_5_lugar.value;
        resultado.innerHTML = ``;

        let acertos = 0;

        if (primeiro == classificacao[0]) {
            resultado.innerHTML =
                `
                <span style="color:green; font-weight:600;">
                    Palpite para o 1º lugar: (${primeiro}), Correto!
                </span>
            `;

            acertos++;
        } else {
            resultado.innerHTML =
                `
                <span style="color:red; font-weight: 600;">
                    Palpite para o 1º lugar: (${primeiro}), Incorreto!
                </span>
            `;
        }

        if (segundo == classificacao[1]) {
            resultado.innerHTML +=
                `
                <span style="color:green; font-weight:600;">
                    Palpite para o 2º lugar: (${segundo}), Correto!<br>!
                </span>
            `;

            acertos++;
        } else {
            resultado.innerHTML +=
                `
                <span style="color:red; font-weight: 600;">
                    Palpite para o 2º lugar: (${segundo}), Incorreto!<br>
                </span>
            `;
        }

        if (terceiro == classificacao[2]) {
            resultado.innerHTML +=
                `
                <span style="color:green; font-weight:600;">
                   Palpite para o 3º lugar: (${terceiro}), Correto!
                </span>
            `;

            acertos++;
        } else {
            resultado.innerHTML +=
                `
                <span style="color:red; font-weight: 600;">
                    Palpite para o 3º lugar: (${terceiro}), Incorreto!
                </span>
            `;
        }

        if (quarto == classificacao[3]) {
            resultado.innerHTML +=
                `
                <span style="color:green; font-weight:600;">
                   Palpite para o 4º lugar: (${quarto}), Correto!<br>
                </span>
            `;

            acertos++;
        } else {
            resultado.innerHTML +=
                `
                <span style="color:red; font-weight: 600;">
                    Palpite para o 4º lugar: (${quarto}), Incorreto!<br>
                </span>
            `;
        }

        if (quinto == classificacao[4]) {
            resultado.innerHTML +=
                `
                <span style="color:green; font-weight:600;">
                   Palpite para o 5º lugar: (${quinto}), Correto!<br><br>
                </span>
            `;

            acertos++;
        } else {
            resultado.innerHTML +=
                `
                <span style="color:red; font-weight: 600;">
                    Palpite para o 5º lugar: (${quinto}), Incorreto!<br><br>
                </span>
            `;
        }

        resultado.innerHTML += ` Vocẽ acertou ${acertos} palpite(s).<br>`;

        if (acertos >= 3) {
            resultado.innerHTML +=
                `
                Você conhece bem essa competição!<br><br>
                O primeiro colocado do rank é: ${classificacao[0]} 🥇, <br>
                O Rank é: ${classificacao}<br>
            `;
        } else {
            resultado.innerHTML +=
                `
                Você precisa acompanhar mais essa competição!<br><br>
                O primeiro colocado do rank é: ${classificacao[0]} 🥇, <br>
                O Rank é: ${classificacao}<br>
            `;
        }

        if (primeiro == "" || segundo == "" || terceiro == "" || quarto == "" || quinto == "") {
            resultado.innerHTML = `Erro! Preencha os campos!`;
            resultado2.innerHTML = ``;
        }

    }

    let campeoes = [];

    function adicionar() {
        let adicionar_campeoes = ipt_meus_campeoes.value;

        campeoes.push(adicionar_campeoes);

        resultado2.innerHTML =
            `   
            <span style="font-size: 1.4rem; font-weight: 600; color: rgb(107, 107, 28);">Meus Campeões:</span>
            <br><br>
            ${campeoes}.
        `;
    }

    function buscar() {
        let buscar_nome = ipt_buscar.value;

        if (classificacao.includes(buscar_nome) && campeoes.includes(buscar_nome)) {
            resultado3.innerHTML =
                `
                O nome pesquisado está incluido na lista do sistema,<br> e na sua lista de campeões!
            `;
        } else if (classificacao.includes(buscar_nome)) {
            resultado3.innerHTML = `
                O nome pesquisado está incluido somente na lista do sistema!
            `;
        } else if (campeoes.includes(buscar_nome)) {
            resultado3.innerHTML = `
                O nome pesquisado está incluido somente na sua lista de campeões!
            `;
        } else {
            resultado3.innerHTML = `
                O nome pesquisado não está incluido nas listas!
            `;
        }

        if(buscar_nome == ""){
            resultado3.innerHTML = 
            `
                Insira um nome válido!
            `;
        }
    }
</script>
