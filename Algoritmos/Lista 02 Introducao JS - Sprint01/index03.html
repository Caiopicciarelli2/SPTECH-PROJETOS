<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Parte 1 | Lista 02 - Introdução ao JavaScrip | exc 03
    </title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="titulo-atividade">
        <h1>Exercicio 03, futebol.</h1>
    </div>

    <div class="form-atividade">
        <div class="form-itens">
            <div class="form-group-itens">
                <label for="timePessoa">Seu time do coração:</label>
                <input type="text" id="timePessoa" placeholder="Digite seu time">

            </div>

            <div class="form-group-itens">
                <label for="quantidadeTitulos">Quantidade de títulos:</label>
                <input type="text" id="quantidadeTitulos" placeholder="Digite quantos títulos">
            </div>

            <div class="form-group-button">
                <h6 id="resultadoTime"></h6>
                <button onclick="exercicio03()">Amo meu time!</button>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    function exercicio03() {
        let time = timePessoa.value;
        let qtdTitulos = quantidadeTitulos.value;

        resultadoTime.innerHTML = "O time " + time + " tem " + qtdTitulos + " títulos.";
    }
</script>
