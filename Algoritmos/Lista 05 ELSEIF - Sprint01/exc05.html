<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 1. Estrutura de Decisão (ELSE IF) | 5. Classificação de Alunos: Como Está Seu Desempenho?</title>
</head>
<body>
    <label for="id_nota_aluno">Digite a nota do aluno:</label>
    <input type="number" id="id_nota_aluno">

    <button onclick="calcNota()">Classificar aluno</button>

</body>
</html>

<script>
    function calcNota(){
        let nota = Number(id_nota_aluno.value);

        if(nota < 5){
            alert(`Aluno precisa de muita ajuda!`);
        }else if(nota <= 7){
            alert(`Aluno na média.`);
        }else if(nota <= 9.5){
            alert(`Aluno na acima da média.`);
        }else if(nota > 9.5){
            alert(`Aluno fora da curva`);
        }
    }
</script>
