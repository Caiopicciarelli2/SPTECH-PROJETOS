<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 7 - Laços de Repetição (for) | 1. Parte 1</title>
</head>

<body>
    <div class="container">
        <div class="container-title">
            <h1>Lista 7 - Laços de Repetição (for) | Exc 1 e 2.</h1>
        </div>
        <div class="content">
            <div class="content-row">
                <div class="content-row-ipt">
                    <label for="qtd_pessoas_carro">Digite o número de pesssoas:</label>
                    <input type="number" id="qtd_pessoas_carro">
                </div>
                <div class="content-row-ipt">
                    <label for="capacidade_carro">Digite a capacidade do carro:</label>
                    <input type="number" id="capacidade_carro">
                </div>
                <div class="content-row-btn">
                    <button onclick="carro()">#Partiu Carona"</button>
                </div>
                <div class="content-row-resultado">
                    <h6 id="resultado"></h6>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    function carro() {
        let qtd_carro = Number(qtd_pessoas_carro.value);
        let capacidade = Number(capacidade_carro.value);

        if ((qtd_carro == 0 || capacidade == 0) || (qtd_carro < 0 || capacidade < 0)) {
            resultado.innerHTML =
                `
                Complete os campos de forma correta.
            `;
        } else {
            for (let i = 1; i <= qtd_carro; i++) {
                if (i == 1) {
                    resultado.innerHTML =
                        `
                    Entrou o 1º passageiro, o motorista.<br>
                `;
                } else if (i <= capacidade){
                    resultado.innerHTML +=
                        `
                    Entrou o ${i}º passageiro.<br>
                `;
                } else {
                    resultado.innerHTML +=
                        `
                    O ${i}º passageiro terá que esperar! O limite do carro são 5 pessoas.<br> 
                `;
                }
            }
        }
    }
</script>
