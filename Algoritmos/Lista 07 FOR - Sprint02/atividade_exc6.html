<head>

    <title>Lista 7 - Laços de Repetição (for) | 1. Parte 1</title>
</head>

<body>
    <div class="container">
        <div class="container-title">
            <h1>Lista 7 - Laços de Repetição (for) | exc 6.</h1>
        </div>
        <div class="content">
            <div class="content-row">
                <div class="content-row-ipt">
                    <label for="qtd_cafe">Informe quantas xícaras de café com leite você já bebeu:</label>
                    <input type="number" id="qtd_cafe">
                </div>
                <div class="content-row-btn">
                    <button onclick="cafe()">Ver a quantidade</button>
                </div>
                <div class="content-row-resultado">
                    <h6 id="resultado"></h6>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<script>
    function cafe() {
        let cafe = Number(qtd_cafe.value);
        resultado.innerHTML = ``;

        if ((cafe == 0 || cafe < 0)) {
            resultado.innerHTML =
                `
                Complete os campos de forma correta.
            `;
        } else {
            for (let i = 1; i <= cafe; i++) {
                resultado.innerHTML += 
                `  
                    <img src="./cafe.jpeg" alt"" style="height:50px">
                `;
                resultado.innerHTML += 
                `  
                    <img src="./cafe.jpeg" alt"" style="height:50px">
                `;
                resultado.innerHTML += 
                `  
                    <img src="leite.jpeg" alt"capa" style="height:50px">
                `;
            }
        }
    }
</script>
