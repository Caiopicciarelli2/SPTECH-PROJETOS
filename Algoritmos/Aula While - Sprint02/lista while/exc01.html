<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 1 | 1. Contagem Simples</title>
</head>

<body>
    <button onclick="contar()">Contar</button>

    <div id="resultado">

    </div>
</body>

</html>

<script>
    function contar() {
        let contador = 0;

        while (contador < 15) {
            resultado.innerHTML +=
            `
                número de contador: ${contador + 1} <br>
            `;
            contador ++;
        }
    }
</script>
