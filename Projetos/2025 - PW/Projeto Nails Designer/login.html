<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./assets/css/login.css">

    <!--Links Boostrap 5-->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!--Links Boostrap 5-->

    <!--Links Font Awesome 6-->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!--Links Font Awesome 6-->

    <title>Login Nails Designer</title>
</head>

<body>

    <header>

        <nav class="navbar">
            <div class="nav-items">
                <ul class="nav-list">
                    <li class="nav-logo">
                        <a href="">
                            Rafaela Correia
                        </a>
                    </li>
                    <li class="nav-login">
                        <a href="">
                            Sign Up
                        </a>
                    </li>
                    <li>
                        <a href="">
                            <i class="fa-solid fa-arrow-right-to-bracket" style="color: #ffffff;"></i>
                        </a>
                    </li>
                </ul>

            </div>

        </nav>

    </header>

    <main>
        <div class="Container-login">
            <img src="/assets/midias/Rafaela Correira.png" alt="">
            <div class="content-login">
                <h1>Login</h1>
                <form id="loginForm">
                    <div class="input-login">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                        <small class="error-message" id="emailError"></small>
                    </div>
                    <div class="input-login">
                        <label for="password">Senha</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                        </div>
                        <small class="error-message" id="passwordError"></small>
                    </div>
                    <div class="buttonEyes">
                        <button class="ViewPassword" type="button" id="togglePassword">
                            <i class="fa-solid fa-eye" id="eyeOpen" style="display: none;"></i>
                            <i class="fa-solid fa-eye-slash" id="eyeClosed"></i>
                        </button>
                    </div>
                    <div class="input-login">
                        <button type="submit">Entrar</button>
                    </div>
                </form>
                <div class="link-login">
                    <a href="#">Esqueceu a senha?</a>
                    <a href="#">Criar conta</a>
                </div>
            </div>
        </div>
    </main>















    <script type="module" src="./assets/js/login.js"></script>

    <!--Links Boostrap 5-->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>

    <!--Links Boostrap 5-->
</body>

</html>
